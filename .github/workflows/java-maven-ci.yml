# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Least-privilege default for GITHUB_TOKEN across all jobs (build, dialect-its, mutation).
# Jobs only read the repo; coverage/artifact upload use their own tokens/APIs.
permissions:
  contents: read

# Force JS actions onto Node.js 24 ahead of the Node 20 removal (Sep 2026). Covers actions that
# have no Node 24 major yet (actions/cache, actions/upload-artifact) and transitive ones.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    - name: Build with Maven
      run: mvn clean install --no-transfer-progress
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5

  # Advisory (non-blocking) dialect integration tests against real databases via Testcontainers.
  # ubuntu-latest provides a Docker daemon out of the box. Excluded from the required `build` gate.
  dialect-its:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
    - uses: actions/checkout@v5
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    - name: Run dialect ITs (PostgreSQL / MySQL / MariaDB)
      run: mvn -pl failover-store-jdbc -am -Pdialect-its verify --no-transfer-progress

  # Mandated (blocking) PIT mutation testing of the expiry + key boundary logic.
  # The 95% mutation threshold is enforced in the POM, so this job fails the check below 95%.
  mutation:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v5
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    - name: Run PIT mutation testing on failover-core
      run: mvn -pl failover-core -am -Pmutation test --no-transfer-progress
    - name: Upload PIT report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pit-reports
        path: failover-core/target/pit-reports
        if-no-files-found: ignore

  # Mandated (blocking) Software Composition Analysis: OWASP Dependency-Check scans the whole
  # reactor against the NVD and FAILS the build on any dependency with CVSS >= 7 (HIGH/CRITICAL).
  # Suppressions (audited false positives) live in dependency-check-suppressions.xml.
  dependency-check:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v5
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Cache Maven packages
      uses: actions/cache@v4
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    # Cache the NVD data so each run doesn't re-download the full vulnerability database.
    - name: Cache NVD database
      uses: actions/cache@v4
      with:
        path: ~/.m2/repository/org/owasp/dependency-check-data
        key: ${{ runner.os }}-dependency-check-data
        restore-keys: ${{ runner.os }}-dependency-check-data
    - name: Run OWASP Dependency-Check (fails on CVSS >= 7)
      env:
        NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
      run: mvn -Pdependency-check verify -DskipTests -Dnvd.api.key="$NVD_API_KEY" --no-transfer-progress
    - name: Upload Dependency-Check report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: dependency-check-report
        path: '**/target/dependency-check-report.*'
        if-no-files-found: ignore
