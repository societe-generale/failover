# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    - name: Build with Maven
      run: mvn clean install --no-transfer-progress
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3

  # Advisory (non-blocking) dialect integration tests against real databases via Testcontainers.
  # ubuntu-latest provides a Docker daemon out of the box. Excluded from the required `build` gate.
  dialect-its:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    - name: Run dialect ITs (PostgreSQL / MySQL / MariaDB)
      run: mvn -pl failover-store-jdbc -am -Pdialect-its verify --no-transfer-progress

  # Advisory (non-blocking) PIT mutation testing of the expiry + key boundary logic.
  mutation:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Cache Maven packages
      uses: actions/cache@v3
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2
    - name: Run PIT mutation testing on failover-core
      run: mvn -pl failover-core -am -Pmutation test --no-transfer-progress
    - name: Upload PIT report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pit-reports
        path: failover-core/target/pit-reports
        if-no-files-found: ignore
