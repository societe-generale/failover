name: autoupdate
on:
  # This will trigger on all pushes to all branches.
  push:
    branches:
      - 'main'
permissions:
  contents: read
jobs:
  autoupdate:
    name: autoupdate
    runs-on: ubuntu-22.04
    steps:
      - uses: docker://chinthakagodawita/autoupdate-action:v1
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'