name: autoupdate
on:
  # This will trigger on all pushes to all branches.
  push:
    branches:
      - 'main'

# Least-privilege: the autoupdate action merges the base branch into open PRs,
# which needs write access to repository contents and pull requests.
permissions:
  contents: write
  pull-requests: write
  workflows: write

jobs:
  autoupdate:
    name: autoupdate
    runs-on: ubuntu-22.04
    steps:
      - uses: docker://chinthakagodawita/autoupdate-action:v1
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'