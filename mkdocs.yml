site_name: Failover
site_description: Transparent failover for referential data — annotation-driven, Spring Boot native.
site_url: https://societe-generale.github.io/failover
repo_url: https://github.com/societe-generale/failover
repo_name: societe-generale/failover
edit_uri: edit/main/docs/

theme:
  name: material
  custom_dir: docs/web/html
  logo: web/assets/logo.svg
  favicon: web/assets/logo.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - scheme: slate
      primary: custom
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
    admonition:
      note:     octicons/tag-16
      abstract: octicons/checklist-16
      info:     octicons/info-16
      tip:      octicons/squirrel-16
      success:  octicons/check-16
      question: octicons/question-16
      warning:  octicons/alert-16
      failure:  octicons/x-circle-16
      danger:   octicons/zap-16
      bug:      octicons/bug-16
      example:  octicons/beaker-16
      quote:    octicons/quote-16
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.prune
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - announce.dismiss
    - toc.follow

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|(?!\b)(?=[A-Z][a-z])'
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      exclude:
        - index.md
        - api/javadoc/**
        - reference/javadoc/**
  - tags
  - glightbox

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
  - Concepts:
    - concepts/index.md
    - How It Works: concepts/how-it-works.md
    - Expiry Policies: concepts/expiry.md
    - Key Generation: concepts/key-generation.md
    - Scatter / Gather: concepts/scatter-gather.md
    - Domain Grouping: concepts/domain.md
  - Configuration:
    - configuration/index.md
    - Properties Reference: configuration/properties-reference.md
    - Store Types: configuration/store-types.md
    - Multi-Tenant: configuration/multi-tenant.md
  - How-to Guides:
    - how-to/index.md
    - Configure @Failover: how-to/configure-failover-annotation.md
    - Custom Key Generator: how-to/custom-key-generator.md
    - Custom Expiry Policy: how-to/custom-expiry-policy.md
    - Exception Policy: how-to/exception-policy.md
    - Recovered Payload Handler: how-to/recovered-payload-handler.md
    - Custom Payload Enricher: how-to/custom-payload-enricher.md
    - Payload Splitter: how-to/payload-splitter.md
    - Context Propagation: how-to/context-propagation.md
    - Payload Column Resolver: how-to/payload-column-resolver.md
    - Database Resolver: how-to/database-resolver.md
    - Failover Store Query Resolver: how-to/failover-store-query-resolver.md
    - Observability: how-to/observability.md
  - Modules:
    - modules/index.md
    - Core: modules/core.md
    - JDBC Store: modules/store-jdbc.md
    - Caffeine Store: modules/store-caffeine.md
    - Async Store: modules/store-async.md
    - Multi-Tenant Store: modules/store-multitenant.md
    - Resilience: modules/execution-resilience.md
    - Scheduler: modules/scheduler.md
    - Observability: modules/observability.md
    - Dashboard: modules/dashboard.md
  - Quality:
    - quality/index.md
    - Dialect Integration Tests: quality/integration-tests.md
    - Concurrency Tests: quality/concurrency-tests.md
    - Architecture Tests: quality/architecture-tests.md
    - Mutation Testing: quality/mutation-testing.md
    - Micro-Benchmarks: quality/benchmarks.md
  - Reference:
    - reference/index.md
    - '@Failover Annotation': reference/annotation.md
    - Key Interfaces: reference/interfaces.md
    - Java Docs: reference/javadocs.md
  - Architecture Decisions:
    - Decision Index: adr/index.md
    - All Decisions: adr/adr.md
  - Changelog:
    - changelog/index.md
    - Changelog: changelog/changelog.md
  - Support:
    - support/index.md
    - FAQ: support/faq.md
    - Support: support/support.md
    - Contributing: support/contributing.md
    - Security: support/security.md
    - About: support/about.md

not_in_nav: |
  reference/javadoc/**

validation:
  links:
    absolute_links: ignore
    unrecognized_links: ignore
    anchors: warn
    not_found: warn

extra_css:
  - web/css/overrides.css

extra_javascript:
  - web/js/font-size.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/societe-generale/failover
  version:
    provider: mike
  copyright: Copyright &copy; 2024 Société Générale
